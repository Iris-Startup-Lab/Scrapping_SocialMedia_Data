<!-- Micro-interaction Script -->
<script>
        // Simple password visibility toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        let isVisible = false;

        toggleBtn.addEventListener('click', () => {
            isVisible = !isVisible;
            passwordInput.type = isVisible ? 'text' : 'password';
            toggleBtn.querySelector('span').textContent = isVisible ? 'visibility' : 'visibility_off';
        });

        // Subtle parallax effect on the glass card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
